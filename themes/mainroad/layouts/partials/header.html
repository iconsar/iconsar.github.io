<header class="site-header">
	<div class="site-header__inner">
		<a class="site-header__logo" href="{{ "" | relLangURL }}" title="{{ .Site.Title }}" rel="home">
			<img class="site-header__icon" src="/img/icons_chico.png" alt="peace dove" />
			<div class="site-header__text">
				<div class="logo__title">{{ replace .Site.Title "---" "—" }}</div>
				{{ with .Site.Params.subtitle }}<div class="logo__tagline">{{ . }}</div>{{ end }}
			</div>
		</a>
		{{ partial "menu.html" . }}
	</div>
</header>
